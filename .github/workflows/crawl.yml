name: 每日空气质量数据更新

on:
  schedule:
    - cron: '0 1 * * *'   # UTC 01:00 = 北京时间 09:00
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r web_app/main/requirements.txt

      - name: 运行 AQI 爬虫脚本
        run: python web_app/main/crawlers/national_aqi_crawler.py

      - name: 运行预警爬虫脚本
        run: python web_app/main/crawlers/weather_alarm_crawler.py

      - name: 提交并推送更新
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add web_app/main/data_output/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自动更新空气质量与预警数据 [skip ci]" && git push)
