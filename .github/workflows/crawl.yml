# GitHub Actions — 每日空气质量数据自动更新
# 每天 UTC 01:00（北京时间 09:00）自动运行爬虫，提交新数据到仓库

name: 每日空气质量数据更新

on:
  schedule:
    # 北京时间 09:00 = UTC 01:00
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许在 GitHub Actions 页面手动触发

permissions:
  contents: write  # 允许机器人推送提交

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      # ---- 1. 检出仓库代码 ----
      - name: 检出代码
        uses: actions/checkout@v4

      # ---- 2. 配置 Python 3.11 ----
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ---- 3. 安装依赖 ----
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r main/requirements.txt

      # ---- 4. 运行 AQI 爬虫 ----
      - name: 运行 AQI 爬虫脚本
        run: python main/crawlers/national_aqi_crawler.py

      # ---- 5. 提交并推送数据文件 ----
      - name: 提交并推送更新
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add main/data_output/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自动更新空气质量数据 [skip ci]" && git push)
