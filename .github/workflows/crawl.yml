name: 每日空气质量数据更新

on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 4 * * *'
    - cron: '0 7 * * *'
    - cron: '0 10 * * *'
    - cron: '0 13 * * *'
    - cron: '0 16 * * *'
    - cron: '0 19 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r main/requirements.txt

      - name: 运行 AQI 爬虫脚本
        run: python main/crawlers/national_aqi_crawler.py

      - name: 运行预警爬虫脚本
        run: python main/crawlers/weather_alarm_crawler.py

      - name: 提交并推送更新
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add main/data_output/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自动更新空气质量与预警数据 [skip ci]" && git push)
